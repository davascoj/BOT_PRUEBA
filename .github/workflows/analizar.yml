name: BOT-ARQ V4.8 - Analizar

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Forzar ejecucion manual"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  schedule:
    - cron: "*/5 13-21 * * 1-5"

  push:
    branches:
      - main
    paths:
      - ".github/workflows/analizar.yml"
      - "analizador_acciones.py"
      - "index.html"
      - "script.js"
      - "style.css"
      - "requirements.txt"
      - "config/**"
      - "engine/**"
      - "execution/**"
      - "scripts/**"

permissions:
  contents: write

concurrency:
  group: bot-arq-v4-8-analizar
  cancel-in-progress: false

jobs:
  analizar:
    name: Analizar mercado
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar librerias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar analizador
        run: |
          python analizador_acciones.py

      - name: Guardar resultados generados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Agregando archivos necesarios para GitHub Pages..."

          for file in datos_acciones.json historial_senales.json paper/paper_state.json paper/paper_audit.json paper/paper_operational_rules.json data/ticker_health.json reports/backtest_summary.json reports/backtest_by_sector.json reports/backtest_by_signal.json reports/backtest_by_month.json reports/executive_report.json reports/executive_report.md; do
            if [ -f "$file" ]; then
              git add "$file"
              echo "Agregado: $file"
            else
              echo "No existe, se omite: $file"
            fi
          done

          if git diff --cached --quiet; then
            echo "No hay cambios para guardar."
          else
            git commit -m "Actualizar analisis automatico BOT-ARQ V4.8"
            git pull --rebase origin main || true
            git push origin main
          fi
